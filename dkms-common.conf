set -e

DKMS_SOURCE_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

MODULE_NAME="$(tr -d '[:space:]' < "$DKMS_SOURCE_DIR/MODULE_NAME")"

PACKAGE_NAME="$MODULE_NAME"
BUILT_MODULE_NAME[0]="$MODULE_NAME"

PACKAGE_VERSION="$(cat "$DKMS_SOURCE_DIR/VERSION")"

BUILT_MODULE_LOCATION[0]="."
DEST_MODULE_LOCATION[0]="/updates/dkms"
AUTOINSTALL="yes"

MAKE[0]="make KERNELRELEASE=${kernelver}"
CLEAN="make clean KERNELRELEASE=${kernelver}"

POST_INSTALL="./commons/scripts/dkms-post-install.sh"
POST_REMOVE="./commons/scripts/dkms-post-remove.sh"
